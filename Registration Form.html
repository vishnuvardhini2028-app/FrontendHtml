<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body{
            font-family: Arial;
            background-color:#e6f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }
         .b1{
            background-color: goldenrod;
            width: 150px;
            height: 30px;
           
           
           }
        .b2{
            background-color: goldenrod;
            width: 150px;
            height: 30px;
            margin-left: 180px;
           
           }
           label
          {
            font-weight: 450;
            font-style: normal;
            color: brown;
           }
           .b1:hover{
background:darkgreen;
}
.b2:hover{
    background-color: darkgreen;

}
       
    </style>
</head>
<body>
    <div class="one">
    <h3>Registration Form</h3>
    <form action="">
    <label for="">Name : </label>
    <input type="text" name="" id=""><br><br>
    <label for="">Enter your MailId : </label>
    <input type="email" name="" id=""><br><br>
    <label for="">Username : </label>
    <input type="text" name="" id=""><br><br>
    <label for="">Password : </label>
    <input type="password" name="" id=""><br><br>
    <label for=""> Confirm Password : </label>
    <input type="password" name="" id=""><br><br>
    <input type="radio" name="gender" id="">
    <label for="">Male</label><br><br>
    <input type="radio" name="gender" id="">
    <label for="">Female</label><br><br>
    <label for="">Date of Birth : </label>
    <input type="date" name="" id=""><br><br>
    <label for="">Mobile Number : </label>
    <input type="tel" placeholder="Enter your Mobile Number"><br><br>
    <label for="">Course Selection</label>
    <select name="" id="">
        <option value="">Java</option>
        <option value="">Python</option>
        <option value="">Web development</option>
    </select><br><br>
    <label for="">Address</label>
    <textarea placeholder="Enter your Address" rows="8" cols="50"></textarea><br><br><br>
    <input type="checkbox">Accept Terms & Conditions <br><br><br>
    <button type="submit" class="b1">Register</button>
    <button type="reset" class="b2">reset</button>
</form>
</div>

</body>
</html>
