<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
body
{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:white;
padding:30px;
width:300px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid gray;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

a{
display:block;
margin-top:10px;
text-align:center;
}

    </style>
</head>
<body>
    <div class="login">
    <h4>Login Form</h4>
    <form action="">
        <input type="text" placeholder="Username or Email"><br><br>
        <input type="text" placeholder="Password"><br><br>
        <button>Login</button><br><br>
        <a href="#">New user? Register here</a>

    </form>
    </div>



    
</body>
</html>
